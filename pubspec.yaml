name: teenpay
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  qr_flutter: ^4.0.0
  share_plus: ^7.2.1
  qr_code_scanner: ^1.0.1

  # ---------------- State management & utilities ----------------
  provider: ^6.0.5
  image_picker: ^1.2.0

  # ---------------- Firebase packages ----------------
  firebase_core: ^4.1.1   # Required to initialize Firebase
  firebase_auth: ^6.1.0   # For OTP / phone authentication
  firebase_analytics: ^12.0.2  # Optional
  cloud_firestore: ^6.0.2    # Optional
  crypto: ^3.0.6
  firebase_storage: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/login-icons/
    - assets/KYC-icons/
