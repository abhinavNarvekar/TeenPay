name: teenpay
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # ---------------- State management & utilities ----------------
  provider: ^6.0.5
  image_picker: ^1.2.0

  # ---------------- Firebase packages ----------------
  firebase_core: ^4.1.1   # Required to initialize Firebase
  firebase_auth: ^6.1.0   # For OTP / phone authentication
  # firebase_analytics: ^10.7.0  # Optional
  # cloud_firestore: ^5.16.0     # Optional

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/login-icons/
    - assets/KYC-icons/
